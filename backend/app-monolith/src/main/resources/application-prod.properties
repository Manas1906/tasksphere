# Database connection - using Environment Variables injected by Koyeb/Render/Supabase
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA & Hibernate Settings for production
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Disable H2 Console in production for security
spring.h2.console.enabled=false

# Enable automatic SQL schema migration on startup against PostgreSQL
spring.sql.init.mode=always

