# Server configuration
server.port=8080

# Active Profiles (default is local/dev using H2)
spring.profiles.active=dev,local


# H2 Database configuration
spring.datasource.url=jdbc:h2:mem:taskspheredb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA & Hibernate configuration
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console configuration for database inspection
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# WebSocket & file upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Security JWT configuration
security.jwt.secret=${JWT_SECRET_KEY:default_development_secret_key_minimum_256_bits_for_signature_validation_purposes_only_1234567890}
security.jwt.expiration-ms=86400000


# Google Apps Script Email Proxy (Optional Personal Gmail Redirector)
google.script.url=${GOOGLE_SCRIPT_URL:}

# Google OAuth2 Gmail API (Method 2)
google.oauth.client.id=${OAUTH_CLIENT_ID:}
google.oauth.client.secret=${OAUTH_CLIENT_SECRET:}
google.oauth.refresh.token=${OAUTH_REFRESH_TOKEN:}
google.oauth.email=${OAUTH_EMAIL:}


# Redis Configuration (Phase 10)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
spring.data.redis.timeout=35000


# Google Gemini API Configuration (Phase 11)
gemini.api.key=${GEMINI_API_KEY:}


