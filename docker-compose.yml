version: '3.8'

services:
  # ☕ Spring Boot Java Application (Rest API & WS Broker)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tasksphere-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JWT_SECRET_KEY=default_development_secret_key_minimum_256_bits_for_signature_validation_purposes_only_1234567890
      # SMTP & Email API credentials can be injected here or in local environment files
      - SMTP_USERNAME=acharyamanas1906@gmail.com
      - SMTP_PASSWORD=
      - RESEND_API_KEY=
      - MAILJET_API_KEY=
      - MAILJET_SECRET_KEY=
      - MAILERSEND_API_KEY=
      - MAILERSEND_SENDER=
    restart: always

  # ⚡ Vite Static Application & Nginx Gateway/Reverse-Proxy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tasksphere-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
